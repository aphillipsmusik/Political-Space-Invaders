<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Head Hunters: Space Invaders</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        h1 {
            color: #00ff00;
            font-size: 1.6em;
            text-align: center;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 4px;
        }
        #wrap { position: relative; }
        #hud {
            display: flex;
            justify-content: space-between;
            padding: 4px 12px;
            background: #000;
            border: 2px solid #00ff00;
            border-bottom: none;
            color: #00ff00;
            font-size: 14px;
        }
        canvas {
            display: block;
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }
        #footer {
            display: flex;
            justify-content: space-around;
            padding: 4px;
            background: #000;
            border: 2px solid #00ff00;
            border-top: none;
            font-size: 12px;
        }
        .f-trump { color: #ff8800; }
        .f-fauci { color: #ffff00; }
        .f-gates { color: #00ffff; }
        .f-ufo   { color: #ff00ff; }
    </style>
</head>
<body>
    <h1>★ HEAD HUNTERS ★</h1>
    <div id="wrap">
        <div id="hud">
            <span>SCORE: <b id="sc">0</b></span>
            <span>HI-SCORE: <b id="hi">0</b></span>
            <span>LEVEL: <b id="lv">1</b></span>
            <span>LIVES: <b id="li">♥♥♥</b></span>
        </div>
        <canvas id="c" width="800" height="560"></canvas>
        <div id="footer">
            <span class="f-trump">■ TRUMP = 10pts</span>
            <span class="f-fauci">■ FAUCI = 20pts</span>
            <span class="f-gates">■ GATES = 30pts</span>
            <span class="f-ufo">⊕ UFO = 100pts</span>
        </div>
    </div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── CONFIG ───────────────────────────────────────────────────────────────────
const COLS = 8, ROWS = 3;
const IW = 64, IH = 56;
const COL_STEP = 90, ROW_STEP = 72;
const START_X = (W - (COLS - 1) * COL_STEP) / 2;
const START_Y = 75;

const ROW_TYPES = ['gates', 'fauci', 'trump'];
const ROW_PTS   = [30, 20, 10];
const ROW_GLOW  = ['#00ffff', '#ffff00', '#ff8800'];

// ── STATE ────────────────────────────────────────────────────────────────────
let score = 0, hiScore = 0, lives = 3, level = 1;
let state = 'start';
let tick = 0, animFrame = 0;
let invMoveTimer = 0, invDir = 1, needsDrop = false;
let enemyShotTimer = 0;
let msTimer = 0, msNextTime = 15000;
let dyingTimer = 0;

let invaders = [], pBullet = null, eBullets = [], barriers = [], explosions = [], stars = [];
let mysteryShip = null;

const keys = { left: false, right: false, space: false };
const player = { x: W / 2, y: H - 45, w: 52, h: 26, spd: 6, lastShot: 0, cooldown: 350 };

// ── INIT ─────────────────────────────────────────────────────────────────────
function initStars() {
    stars = [];
    for (let i = 0; i < 90; i++)
        stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.5 + 0.3, b: Math.random() });
}

function initInvaders() {
    invaders = [];
    for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
            invaders.push({
                x: START_X + c * COL_STEP,
                y: START_Y + r * ROW_STEP,
                w: IW, h: IH,
                type: ROW_TYPES[r],
                pts: ROW_PTS[r],
                glow: ROW_GLOW[r],
                alive: true, row: r, col: c
            });
}

function initBarriers() {
    barriers = [];
    [140, 310, 490, 660].forEach(bx => {
        for (let r = 0; r < 4; r++)
            for (let c = 0; c < 6; c++) {
                if ((r < 2 && c === 0) || (r < 2 && c === 5)) continue;
                barriers.push({ x: bx - 33 + c * 11, y: H - 150 + r * 11, w: 10, h: 10, hp: 3, maxHp: 3 });
            }
    });
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function drawEye(ex, ey, ew, eh, irisCol) {
    // White
    ctx.fillStyle = '#EEEEEE';
    ctx.beginPath(); ctx.ellipse(ex, ey, ew, eh, 0, 0, Math.PI * 2); ctx.fill();
    // Iris
    ctx.fillStyle = irisCol;
    ctx.beginPath(); ctx.ellipse(ex, ey, ew * 0.62, eh * 0.62, 0, 0, Math.PI * 2); ctx.fill();
    // Pupil
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(ex, ey, ew * 0.32, eh * 0.32, 0, 0, Math.PI * 2); ctx.fill();
    // Catchlight
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(ex + ew * 0.2, ey - eh * 0.25, ew * 0.14, 0, Math.PI * 2); ctx.fill();
    // Upper lid line
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.ellipse(ex, ey - eh * 0.05, ew, eh, 0, Math.PI, 0); ctx.stroke();
}

function drawBrow(bx, by, bw, bh, col, flip) {
    ctx.fillStyle = col;
    ctx.beginPath();
    if (!flip) {
        ctx.moveTo(bx - bw, by + bh);
        ctx.quadraticCurveTo(bx, by - bh, bx + bw, by + bh * 0.3);
        ctx.lineTo(bx + bw, by + bh * 1.1);
        ctx.quadraticCurveTo(bx, by + bh * 0.1, bx - bw, by + bh * 1.4);
    } else {
        ctx.moveTo(bx + bw, by + bh);
        ctx.quadraticCurveTo(bx, by - bh, bx - bw, by + bh * 0.3);
        ctx.lineTo(bx - bw, by + bh * 1.1);
        ctx.quadraticCurveTo(bx, by + bh * 0.1, bx + bw, by + bh * 1.4);
    }
    ctx.closePath(); ctx.fill();
}

// ── DRAW: TRUMP ───────────────────────────────────────────────────────────────
function drawTrump(cx, cy, w, h, fr) {
    const T = cy - h / 2;

    // White shirt collar
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.22, cy + h * 0.36);
    ctx.lineTo(cx - w * 0.42, cy + h * 0.55);
    ctx.lineTo(cx - w * 0.42, cy + h * 0.78);
    ctx.lineTo(cx + w * 0.42, cy + h * 0.78);
    ctx.lineTo(cx + w * 0.42, cy + h * 0.55);
    ctx.lineTo(cx + w * 0.22, cy + h * 0.36);
    ctx.lineTo(cx + w * 0.07, cy + h * 0.46);
    ctx.lineTo(cx - w * 0.07, cy + h * 0.46);
    ctx.closePath(); ctx.fill();

    // Red tie
    ctx.fillStyle = '#CC0000';
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.08, cy + h * 0.38);
    ctx.lineTo(cx + w * 0.08, cy + h * 0.38);
    ctx.lineTo(cx + w * 0.11, cy + h * 0.62);
    ctx.lineTo(cx, cy + h * 0.74);
    ctx.lineTo(cx - w * 0.11, cy + h * 0.62);
    ctx.closePath(); ctx.fill();
    // Tie stripe
    ctx.strokeStyle = '#AA0000'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.04, cy + h * 0.42);
    ctx.lineTo(cx - w * 0.07, cy + h * 0.62);
    ctx.stroke();
    // Tie highlight
    ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx + w * 0.02, cy + h * 0.41);
    ctx.lineTo(cx + w * 0.04, cy + h * 0.6);
    ctx.stroke();

    // Hair base (dark gold shadow)
    ctx.fillStyle = '#9A7000';
    ctx.beginPath();
    ctx.ellipse(cx + w * 0.05, T + h * 0.2, w * 0.45, h * 0.26, 0, Math.PI, 0);
    ctx.fill();

    // Face with gradient
    const faceGrad = ctx.createRadialGradient(cx - w * 0.08, cy - h * 0.1, w * 0.04, cx, cy + h * 0.05, w * 0.46);
    faceGrad.addColorStop(0, '#FFBB66');
    faceGrad.addColorStop(0.45, '#E07020');
    faceGrad.addColorStop(1, '#A04810');
    ctx.fillStyle = faceGrad;
    ctx.beginPath();
    ctx.ellipse(cx, cy + h * 0.07, w * 0.41, h * 0.39, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pale goggle / tan-line area
    ctx.fillStyle = 'rgba(255,220,170,0.55)';
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.13, cy - h * 0.07, w * 0.155, h * 0.115, -0.18, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + w * 0.13, cy - h * 0.07, w * 0.155, h * 0.115, 0.18, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    drawEye(cx - w * 0.155, cy - h * 0.075, w * 0.1, h * 0.075, '#4A6EA8');
    drawEye(cx + w * 0.155, cy - h * 0.075, w * 0.1, h * 0.075, '#4A6EA8');

    // Eyebrows (heavy, orange-ish)
    drawBrow(cx - w * 0.155, cy - h * 0.19, w * 0.13, h * 0.028, '#CC8822', false);
    drawBrow(cx + w * 0.155, cy - h * 0.19, w * 0.13, h * 0.028, '#CC8822', true);

    // Nose
    ctx.strokeStyle = '#B05510'; ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(cx, cy - h * 0.02);
    ctx.quadraticCurveTo(cx + w * 0.09, cy + h * 0.06, cx + w * 0.07, cy + h * 0.13);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy - h * 0.02);
    ctx.quadraticCurveTo(cx - w * 0.09, cy + h * 0.06, cx - w * 0.07, cy + h * 0.13);
    ctx.stroke();
    // Nostrils
    ctx.fillStyle = '#904010';
    ctx.beginPath(); ctx.ellipse(cx - w * 0.08, cy + h * 0.13, w * 0.042, h * 0.028, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w * 0.08, cy + h * 0.13, w * 0.042, h * 0.028, 0.3, 0, Math.PI * 2); ctx.fill();

    // Mouth – pursed lips
    ctx.fillStyle = '#C05030';
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.16, cy + h * 0.22);
    ctx.bezierCurveTo(cx - w * 0.07, cy + h * 0.185, cx + w * 0.07, cy + h * 0.185, cx + w * 0.16, cy + h * 0.22);
    ctx.bezierCurveTo(cx + w * 0.09, cy + h * 0.26, cx - w * 0.09, cy + h * 0.26, cx - w * 0.16, cy + h * 0.22);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#A03820';
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.16, cy + h * 0.22);
    ctx.bezierCurveTo(cx - w * 0.07, cy + h * 0.25, cx + w * 0.07, cy + h * 0.25, cx + w * 0.16, cy + h * 0.22);
    ctx.bezierCurveTo(cx + w * 0.09, cy + h * 0.295, cx - w * 0.09, cy + h * 0.295, cx - w * 0.16, cy + h * 0.22);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#7A2010'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.16, cy + h * 0.22); ctx.lineTo(cx + w * 0.16, cy + h * 0.22);
    ctx.stroke();

    // Comb-over hair – layered
    const hairColors = ['#A07800', '#C89A00', '#E8B800', '#FFD700', '#FFE44A', '#FFF088'];
    for (let i = 0; i < 9; i++) {
        ctx.strokeStyle = hairColors[Math.min(i, hairColors.length - 1)];
        ctx.lineWidth = i < 3 ? 2.5 : 1.8;
        ctx.beginPath();
        const sx = cx - w * 0.38 + i * w * 0.08;
        const peakX = cx + w * (0.22 - i * 0.06);
        ctx.moveTo(sx, cy - h * 0.28 + i * h * 0.02);
        ctx.quadraticCurveTo(peakX, T - h * 0.04, cx + w * 0.4 - i * w * 0.04, cy - h * 0.22 + i * h * 0.025);
        ctx.stroke();
    }
    // Hair fill on top
    ctx.fillStyle = '#C89A00';
    ctx.beginPath();
    ctx.ellipse(cx + w * 0.06, T + h * 0.17, w * 0.4, h * 0.2, 0, Math.PI, 0);
    ctx.fill();

    // Small hands – animated
    ctx.fillStyle = '#E07020';
    const hy = cy + (fr === 0 ? h * 0.08 : h * 0.2);
    // Left
    ctx.beginPath(); ctx.ellipse(cx - w * 0.46, hy, w * 0.08, h * 0.06, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#C05810';
    for (let f = 0; f < 3; f++) {
        ctx.beginPath(); ctx.ellipse(cx - w * 0.46 + (f - 1) * w * 0.05, hy - h * 0.06, w * 0.025, h * 0.02, 0, 0, Math.PI * 2); ctx.fill();
    }
    // Right
    ctx.fillStyle = '#E07020';
    ctx.beginPath(); ctx.ellipse(cx + w * 0.46, hy, w * 0.08, h * 0.06, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#C05810';
    for (let f = 0; f < 3; f++) {
        ctx.beginPath(); ctx.ellipse(cx + w * 0.46 + (f - 1) * w * 0.05, hy - h * 0.06, w * 0.025, h * 0.02, 0, 0, Math.PI * 2); ctx.fill();
    }
}

// ── DRAW: FAUCI ───────────────────────────────────────────────────────────────
function drawFauci(cx, cy, w, h, fr) {
    const T = cy - h / 2;

    // Lab coat
    const coatGrad = ctx.createLinearGradient(cx - w * 0.42, 0, cx + w * 0.42, 0);
    coatGrad.addColorStop(0, '#D8D8D8');
    coatGrad.addColorStop(0.5, '#F5F5F5');
    coatGrad.addColorStop(1, '#DDDDDD');
    ctx.fillStyle = coatGrad;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.42, cy + h * 0.32);
    ctx.lineTo(cx - w * 0.42, cy + h * 0.78);
    ctx.lineTo(cx + w * 0.42, cy + h * 0.78);
    ctx.lineTo(cx + w * 0.42, cy + h * 0.32);
    ctx.lineTo(cx + w * 0.18, cy + h * 0.3);
    ctx.lineTo(cx + w * 0.06, cy + h * 0.44);
    ctx.lineTo(cx - w * 0.06, cy + h * 0.44);
    ctx.lineTo(cx - w * 0.18, cy + h * 0.3);
    ctx.closePath(); ctx.fill();
    // Coat lapels
    ctx.fillStyle = '#E8E8E8';
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.18, cy + h * 0.3);
    ctx.lineTo(cx - w * 0.06, cy + h * 0.44);
    ctx.lineTo(cx - w * 0.1, cy + h * 0.55);
    ctx.lineTo(cx - w * 0.28, cy + h * 0.38);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + w * 0.18, cy + h * 0.3);
    ctx.lineTo(cx + w * 0.06, cy + h * 0.44);
    ctx.lineTo(cx + w * 0.1, cy + h * 0.55);
    ctx.lineTo(cx + w * 0.28, cy + h * 0.38);
    ctx.closePath(); ctx.fill();

    // Gray hair – sides
    ctx.fillStyle = '#888888';
    ctx.beginPath(); ctx.ellipse(cx - w * 0.38, cy - h * 0.14, w * 0.1, h * 0.28, 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w * 0.38, cy - h * 0.14, w * 0.1, h * 0.28, -0.1, 0, Math.PI * 2); ctx.fill();
    // Hair top
    ctx.fillStyle = '#999999';
    ctx.beginPath(); ctx.ellipse(cx, T + h * 0.19, w * 0.35, h * 0.2, 0, Math.PI, 0); ctx.fill();
    // Hair highlight
    ctx.fillStyle = '#BBBBBB';
    ctx.beginPath(); ctx.ellipse(cx - w * 0.06, T + h * 0.14, w * 0.18, h * 0.1, -0.2, Math.PI, 0); ctx.fill();

    // Face with gradient
    const faceGrad = ctx.createRadialGradient(cx - w * 0.08, cy - h * 0.1, w * 0.03, cx, cy + h * 0.04, w * 0.44);
    faceGrad.addColorStop(0, '#E8B090');
    faceGrad.addColorStop(0.5, '#C88060');
    faceGrad.addColorStop(1, '#986040');
    ctx.fillStyle = faceGrad;
    ctx.beginPath(); ctx.ellipse(cx, cy + h * 0.04, w * 0.38, h * 0.38, 0, 0, Math.PI * 2); ctx.fill();

    // Ears
    ctx.fillStyle = '#C07858';
    ctx.beginPath(); ctx.ellipse(cx - w * 0.39, cy + h * 0.04, w * 0.07, h * 0.1, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w * 0.39, cy + h * 0.04, w * 0.07, h * 0.1, 0, 0, Math.PI * 2); ctx.fill();

    // Glasses (dark rectangular – Fauci's signature)
    const gly = cy - h * 0.09;
    const glH = h * 0.2, glW = w * 0.27;
    // Lens tint
    ctx.fillStyle = 'rgba(100,150,200,0.18)';
    ctx.fillRect(cx - w * 0.37, gly, glW, glH);
    ctx.fillRect(cx + w * 0.1, gly, glW, glH);
    // Frames
    ctx.strokeStyle = '#1A1A1A'; ctx.lineWidth = 2.8;
    ctx.strokeRect(cx - w * 0.37, gly, glW, glH);
    ctx.strokeRect(cx + w * 0.1, gly, glW, glH);
    // Bridge
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx - w * 0.1, gly + glH * 0.5); ctx.lineTo(cx + w * 0.1, gly + glH * 0.5); ctx.stroke();
    // Temples
    ctx.beginPath(); ctx.moveTo(cx - w * 0.37, gly + glH * 0.5); ctx.lineTo(cx - w * 0.46, gly + glH * 0.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + w * 0.37, gly + glH * 0.5); ctx.lineTo(cx + w * 0.46, gly + glH * 0.3); ctx.stroke();

    // Eyes (behind glasses)
    drawEye(cx - w * 0.235, gly + glH * 0.5, w * 0.09, h * 0.07, '#5A4030');
    drawEye(cx + w * 0.235, gly + glH * 0.5, w * 0.09, h * 0.07, '#5A4030');

    // Eyebrows
    drawBrow(cx - w * 0.235, gly + h * 0.02, w * 0.1, h * 0.022, '#555555', false);
    drawBrow(cx + w * 0.235, gly + h * 0.02, w * 0.1, h * 0.022, '#555555', true);

    // Nose
    ctx.strokeStyle = '#9A6040'; ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(cx, cy - h * 0.02);
    ctx.quadraticCurveTo(cx + w * 0.09, cy + h * 0.07, cx + w * 0.075, cy + h * 0.15);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy - h * 0.02);
    ctx.quadraticCurveTo(cx - w * 0.09, cy + h * 0.07, cx - w * 0.075, cy + h * 0.15);
    ctx.stroke();
    ctx.fillStyle = '#7A4828';
    ctx.beginPath(); ctx.ellipse(cx - w * 0.09, cy + h * 0.15, w * 0.044, h * 0.027, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w * 0.09, cy + h * 0.15, w * 0.044, h * 0.027, 0.3, 0, Math.PI * 2); ctx.fill();

    // Smile
    ctx.fillStyle = '#B07050';
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.15, cy + h * 0.24);
    ctx.bezierCurveTo(cx - w * 0.06, cy + h * 0.2, cx + w * 0.06, cy + h * 0.2, cx + w * 0.15, cy + h * 0.24);
    ctx.bezierCurveTo(cx + w * 0.08, cy + h * 0.29, cx - w * 0.08, cy + h * 0.29, cx - w * 0.15, cy + h * 0.24);
    ctx.closePath(); ctx.fill();
    // Teeth hint
    ctx.fillStyle = '#F0EEE8';
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.1, cy + h * 0.245);
    ctx.lineTo(cx + w * 0.1, cy + h * 0.245);
    ctx.lineTo(cx + w * 0.08, cy + h * 0.275);
    ctx.lineTo(cx - w * 0.08, cy + h * 0.275);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#7A3820'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - w * 0.15, cy + h * 0.245); ctx.lineTo(cx + w * 0.15, cy + h * 0.245); ctx.stroke();

    // Pointing finger – animated
    ctx.fillStyle = '#C08060';
    const fingerDir = fr === 0 ? 1 : -1;
    const fx = cx + fingerDir * w * 0.38;
    ctx.beginPath();
    ctx.moveTo(fx, cy + h * 0.38);
    ctx.lineTo(fx + fingerDir * w * 0.16, cy + h * 0.18);
    ctx.lineTo(fx + fingerDir * w * 0.19, cy + h * 0.25);
    ctx.lineTo(fx + fingerDir * w * 0.05, cy + h * 0.45);
    ctx.closePath(); ctx.fill();
    // Fingernail
    ctx.fillStyle = '#FFDDCC';
    ctx.beginPath(); ctx.ellipse(fx + fingerDir * w * 0.175, cy + h * 0.2, w * 0.025, h * 0.018, fr === 0 ? -0.5 : 0.5, 0, Math.PI * 2); ctx.fill();
}

// ── DRAW: GATES ───────────────────────────────────────────────────────────────
function drawGates(cx, cy, w, h, fr) {
    const T = cy - h / 2;

    // Blue sweater/fleece
    const sweaterGrad = ctx.createLinearGradient(cx - w * 0.42, 0, cx + w * 0.42, 0);
    sweaterGrad.addColorStop(0, '#163A9A');
    sweaterGrad.addColorStop(0.5, '#2255CC');
    sweaterGrad.addColorStop(1, '#163A9A');
    ctx.fillStyle = sweaterGrad;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.42, cy + h * 0.32);
    ctx.lineTo(cx - w * 0.42, cy + h * 0.78);
    ctx.lineTo(cx + w * 0.42, cy + h * 0.78);
    ctx.lineTo(cx + w * 0.42, cy + h * 0.32);
    ctx.quadraticCurveTo(cx + w * 0.32, cy + h * 0.28, cx + w * 0.2, cy + h * 0.32);
    ctx.lineTo(cx + w * 0.08, cy + h * 0.44);
    ctx.lineTo(cx - w * 0.08, cy + h * 0.44);
    ctx.lineTo(cx - w * 0.2, cy + h * 0.32);
    ctx.quadraticCurveTo(cx - w * 0.32, cy + h * 0.28, cx - w * 0.42, cy + h * 0.32);
    ctx.closePath(); ctx.fill();
    // Collar
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.1, cy + h * 0.32);
    ctx.lineTo(cx + w * 0.1, cy + h * 0.32);
    ctx.lineTo(cx + w * 0.08, cy + h * 0.44);
    ctx.lineTo(cx - w * 0.08, cy + h * 0.44);
    ctx.closePath(); ctx.fill();

    // Brown hair – sides (thinning on top)
    ctx.fillStyle = '#5A3418';
    ctx.beginPath(); ctx.ellipse(cx - w * 0.37, cy - h * 0.12, w * 0.1, h * 0.3, 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w * 0.37, cy - h * 0.12, w * 0.1, h * 0.3, -0.1, 0, Math.PI * 2); ctx.fill();
    // Very thin top
    ctx.fillStyle = '#6B4226';
    ctx.beginPath(); ctx.ellipse(cx - w * 0.06, T + h * 0.14, w * 0.2, h * 0.1, -0.15, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w * 0.06, T + h * 0.14, w * 0.2, h * 0.1, 0.15, Math.PI, 0); ctx.fill();
    // Scalp peek-through
    ctx.fillStyle = '#FFDFC0';
    ctx.beginPath(); ctx.ellipse(cx, T + h * 0.1, w * 0.14, h * 0.07, 0, Math.PI * 2, 0); ctx.fill();

    // Face with gradient
    const faceGrad = ctx.createRadialGradient(cx - w * 0.1, cy - h * 0.12, w * 0.04, cx, cy + h * 0.03, w * 0.44);
    faceGrad.addColorStop(0, '#FFE8CC');
    faceGrad.addColorStop(0.5, '#F0C898');
    faceGrad.addColorStop(1, '#D09060');
    ctx.fillStyle = faceGrad;
    ctx.beginPath(); ctx.ellipse(cx, cy + h * 0.03, w * 0.39, h * 0.4, 0, 0, Math.PI * 2); ctx.fill();

    // Ears
    ctx.fillStyle = '#E0B088';
    ctx.beginPath(); ctx.ellipse(cx - w * 0.4, cy + h * 0.02, w * 0.07, h * 0.1, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w * 0.4, cy + h * 0.02, w * 0.07, h * 0.1, 0, 0, Math.PI * 2); ctx.fill();

    // Round glasses (Gates' signature – wire frame)
    const gcx1 = cx - w * 0.17, gcx2 = cx + w * 0.17, gcy = cy - h * 0.065, gr = w * 0.135;
    // Lens fill
    ctx.fillStyle = 'rgba(160,210,255,0.2)';
    ctx.beginPath(); ctx.arc(gcx1, gcy, gr, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(gcx2, gcy, gr, 0, Math.PI * 2); ctx.fill();
    // Wire frames
    ctx.strokeStyle = '#555555'; ctx.lineWidth = 2.2;
    ctx.beginPath(); ctx.arc(gcx1, gcy, gr, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(gcx2, gcy, gr, 0, Math.PI * 2); ctx.stroke();
    // Bridge (nose piece)
    ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(gcx1 + gr, gcy); ctx.lineTo(gcx2 - gr, gcy); ctx.stroke();
    // Temples
    ctx.beginPath(); ctx.moveTo(gcx1 - gr, gcy); ctx.lineTo(gcx1 - gr - w * 0.1, gcy - h * 0.02); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gcx2 + gr, gcy); ctx.lineTo(gcx2 + gr + w * 0.1, gcy - h * 0.02); ctx.stroke();

    // Eyes behind glasses
    drawEye(gcx1, gcy, w * 0.085, h * 0.065, '#5A7A40');
    drawEye(gcx2, gcy, w * 0.085, h * 0.065, '#5A7A40');

    // Eyebrows
    drawBrow(gcx1, gcy - h * 0.1, w * 0.1, h * 0.022, '#6B4226', false);
    drawBrow(gcx2, gcy - h * 0.1, w * 0.1, h * 0.022, '#6B4226', true);

    // Nose
    ctx.strokeStyle = '#B07840'; ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(cx, cy - h * 0.02);
    ctx.quadraticCurveTo(cx + w * 0.08, cy + h * 0.07, cx + w * 0.065, cy + h * 0.14);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy - h * 0.02);
    ctx.quadraticCurveTo(cx - w * 0.08, cy + h * 0.07, cx - w * 0.065, cy + h * 0.14);
    ctx.stroke();
    ctx.fillStyle = '#A07040';
    ctx.beginPath(); ctx.ellipse(cx - w * 0.075, cy + h * 0.142, w * 0.038, h * 0.025, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w * 0.075, cy + h * 0.142, w * 0.038, h * 0.025, 0.3, 0, Math.PI * 2); ctx.fill();

    // Smile with teeth
    ctx.fillStyle = '#C07850';
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.16, cy + h * 0.22);
    ctx.bezierCurveTo(cx - w * 0.07, cy + h * 0.18, cx + w * 0.07, cy + h * 0.18, cx + w * 0.16, cy + h * 0.22);
    ctx.bezierCurveTo(cx + w * 0.1, cy + h * 0.29, cx - w * 0.1, cy + h * 0.29, cx - w * 0.16, cy + h * 0.22);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#F5F0E8';
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.11, cy + h * 0.225);
    ctx.lineTo(cx + w * 0.11, cy + h * 0.225);
    ctx.lineTo(cx + w * 0.09, cy + h * 0.272);
    ctx.lineTo(cx - w * 0.09, cy + h * 0.272);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#885530'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - w * 0.16, cy + h * 0.22); ctx.lineTo(cx + w * 0.16, cy + h * 0.22); ctx.stroke();

    // Cheek dimples
    ctx.strokeStyle = 'rgba(160,90,50,0.35)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx - w * 0.28, cy + h * 0.24, w * 0.05, 0.2, Math.PI * 0.8); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx + w * 0.28, cy + h * 0.24, w * 0.05, Math.PI * 0.2, Math.PI - 0.2); ctx.stroke();

    // Dollar signs – animated
    if (fr === 0) {
        ctx.fillStyle = '#00cc44';
        ctx.font = `bold ${Math.floor(h * 0.24)}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText('$', cx - w * 0.54, cy + h * 0.1);
        ctx.fillText('$', cx + w * 0.54, cy + h * 0.1);
        ctx.textAlign = 'left';
    }
}

// ── DRAW: SCENE ───────────────────────────────────────────────────────────────
function drawInvader(inv) {
    if (!inv.alive) return;
    ctx.save();
    ctx.shadowBlur = 8; ctx.shadowColor = inv.glow;
    if (inv.type === 'trump') drawTrump(inv.x, inv.y, inv.w, inv.h, animFrame);
    else if (inv.type === 'fauci') drawFauci(inv.x, inv.y, inv.w, inv.h, animFrame);
    else drawGates(inv.x, inv.y, inv.w, inv.h, animFrame);
    ctx.restore();
}

function drawPlayerShip() {
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = '#00ff00';
    ctx.fillStyle = '#00ff00';
    const { x, y, w, h } = player;
    ctx.beginPath();
    ctx.moveTo(x, y - h);
    ctx.lineTo(x - w * 0.5, y);
    ctx.lineTo(x - w * 0.3, y);
    ctx.lineTo(x - w * 0.3, y + h * 0.5);
    ctx.lineTo(x + w * 0.3, y + h * 0.5);
    ctx.lineTo(x + w * 0.3, y);
    ctx.lineTo(x + w * 0.5, y);
    ctx.closePath();
    ctx.fill();
    ctx.fillRect(x - 2.5, y - h - 10, 5, 12);
    ctx.restore();
}

function drawBarriers() {
    for (const b of barriers) {
        if (b.hp <= 0) continue;
        const a = b.hp / b.maxHp;
        ctx.fillStyle = `rgba(0,${Math.floor(150 * a + 80)},0,${0.5 + a * 0.5})`;
        ctx.fillRect(b.x, b.y, b.w, b.h);
    }
}

function drawBullets() {
    if (pBullet) {
        ctx.save();
        ctx.shadowBlur = 8; ctx.shadowColor = '#ffffff';
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(pBullet.x - 2, pBullet.y - 10, 4, 14);
        ctx.restore();
    }
    for (const eb of eBullets) {
        ctx.save();
        ctx.shadowBlur = 8; ctx.shadowColor = '#ff3300';
        ctx.fillStyle = '#ff5500';
        ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ff9900';
        ctx.fillRect(eb.x - 1.5, eb.y, 3, 6);
        ctx.restore();
    }
}

function drawMystery() {
    if (!mysteryShip) return;
    const ms = mysteryShip;
    ctx.save();
    ctx.shadowBlur = 15; ctx.shadowColor = '#ff00ff';
    ctx.fillStyle = '#cc00cc';
    ctx.beginPath(); ctx.ellipse(ms.x, ms.y, 28, 10, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff44ff';
    ctx.beginPath(); ctx.ellipse(ms.x, ms.y - 8, 14, 12, 0, Math.PI, 0); ctx.fill();
    [-16, -8, 0, 8, 16].forEach((dx, i) => {
        ctx.fillStyle = i % 2 === 0 ? '#ffff00' : '#ff0000';
        ctx.beginPath(); ctx.arc(ms.x + dx, ms.y + 4, 3, 0, Math.PI * 2); ctx.fill();
    });
    ctx.restore();
    ctx.fillStyle = '#ff88ff';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('??? 100', ms.x, ms.y - 18);
    ctx.textAlign = 'left';
}

function drawExplosions() {
    for (let i = explosions.length - 1; i >= 0; i--) {
        const e = explosions[i];
        e.f++;
        if (e.f >= e.max) { explosions.splice(i, 1); continue; }
        ctx.globalAlpha = 1 - e.f / e.max;
        e.pts.forEach(pt => {
            ctx.fillStyle = e.col;
            ctx.fillRect(e.x + pt.vx * e.f - 2, e.y + pt.vy * e.f - 2, 4, 4);
        });
        ctx.globalAlpha = 1;
    }
}

function addExplosion(x, y, col) {
    const pts = [];
    for (let i = 0; i < 14; i++) {
        const a = (i / 14) * Math.PI * 2, spd = 1 + Math.random() * 2.5;
        pts.push({ vx: Math.cos(a) * spd, vy: Math.sin(a) * spd });
    }
    explosions.push({ x, y, col, pts, f: 0, max: 28 });
}

function drawStars() {
    for (const s of stars) {
        const alpha = 0.3 + 0.7 * ((s.b + tick * 0.002) % 1);
        ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
        ctx.fillRect(s.x, s.y, s.r * 2, s.r * 2);
    }
}

// ── SCREENS ───────────────────────────────────────────────────────────────────
function drawStart() {
    ctx.fillStyle = 'rgba(0,0,10,0.85)';

    drawTrump(W / 2 - 200, H / 2 - 30, 64, 56, animFrame);
    drawFauci(W / 2,       H / 2 - 30, 64, 56, animFrame);

    ctx.fillStyle = '#ff8800'; ctx.fillText('TRUMP',  W / 2 - 200, H / 2 + 16);
    ctx.fillStyle = '#ffff00'; ctx.fillText('FAUCI',  W / 2,       H / 2 + 16);
    ctx.fillStyle = '#00ffff'; ctx.fillText('GATES',  W / 2 + 200, H / 2 + 16);
    ctx.fillStyle = '#ff8800'; ctx.fillText('10 pts', W / 2 - 200, H / 2 + 29);
    ctx.fillStyle = '#ffff00'; ctx.fillText('20 pts', W / 2,       H / 2 + 29);
    ctx.fillStyle = '#00ffff'; ctx.fillText('30 pts', W / 2 + 200, H / 2 + 29);

    ctx.fillStyle = '#00ff00'; ctx.font = 'bold 34px Courier New';
    ctx.fillText('★ HEAD HUNTERS ★', W / 2, H * 0.2);
    ctx.fillStyle = '#aaffaa'; ctx.font = '15px Courier New';
    ctx.fillText('A Space Invaders Experience', W / 2, H * 0.2 + 30);
    ctx.fillStyle = '#ffffff'; ctx.font = '15px Courier New';
    ctx.fillText('← → MOVE     SPACE / ↑ SHOOT', W / 2, H / 2 + 65);

    if (Math.floor(tick / 35) % 2 === 0) {
        ctx.fillStyle = '#00ff00'; ctx.font = 'bold 20px Courier New';

    }

}

function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff2200'; ctx.font = 'bold 50px Courier New';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
    ctx.fillStyle = '#00ff00'; ctx.font = '22px Courier New';
    ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 10);
    ctx.fillText(`HI: ${hiScore}`, W / 2, H / 2 + 42);
    if (Math.floor(tick / 35) % 2 === 0) {
        ctx.fillStyle = '#ffff00'; ctx.font = '18px Courier New';
        ctx.fillText('PRESS SPACE TO RETRY', W / 2, H / 2 + 85);
    }
    ctx.textAlign = 'left';
}

function drawWin() {
    ctx.fillStyle = 'rgba(0,0,10,0.82)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ff00'; ctx.font = 'bold 42px Courier New';
    ctx.fillText('EARTH SAVED!', W / 2, H / 2 - 50);
    ctx.fillStyle = '#ffff00'; ctx.font = '22px Courier New';
    ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 5);
    ctx.fillStyle = '#aaffaa'; ctx.font = '16px Courier New';
    ctx.fillText(`LEVEL ${level} INCOMING...`, W / 2, H / 2 + 40);
    if (Math.floor(tick / 35) % 2 === 0) {
        ctx.fillStyle = '#00ffff'; ctx.font = '18px Courier New';
        ctx.fillText('PRESS SPACE TO CONTINUE', W / 2, H / 2 + 80);
    }
    ctx.textAlign = 'left';
}

// ── LOGIC ─────────────────────────────────────────────────────────────────────
function aliveInv() { return invaders.filter(i => i.alive); }

function moveInvaders(dt) {
    invMoveTimer += dt;
    const alive = aliveInv();
    if (!alive.length) return;

    const speedup = 1 + (invaders.length - alive.length) / invaders.length * 2.5;
    const interval = Math.max(80, 700 / ((level * 0.5 + 0.5) * speedup));
    if (invMoveTimer < interval) return;
    invMoveTimer = 0;
    animFrame = 1 - animFrame;

    if (needsDrop) {
        needsDrop = false;
        invaders.forEach(i => i.y += 20);
        invDir *= -1;
        return;
    }

    const step = 8;
    const minX = Math.min(...alive.map(i => i.x - i.w / 2));
    const maxX = Math.max(...alive.map(i => i.x + i.w / 2));
    if (invDir === 1 && maxX + step > W - 20) needsDrop = true;
    else if (invDir === -1 && minX - step < 20) needsDrop = true;

    invaders.forEach(i => i.x += step * invDir);
}

function doEnemyShoot(dt) {
    enemyShotTimer += dt;
    const interval = Math.max(400, 2000 - level * 150 - (invaders.length - aliveInv().length) * 30);
    if (enemyShotTimer < interval) return;
    enemyShotTimer = 0;

    const alive = aliveInv();
    if (!alive.length) return;
    const cols = [...new Set(alive.map(i => i.col))];
    const col = cols[Math.floor(Math.random() * cols.length)];
    const shooter = alive.filter(i => i.col === col).sort((a, b) => b.y - a.y)[0];
    eBullets.push({ x: shooter.x, y: shooter.y + shooter.h / 2 + 4, spd: 3 + level * 0.4 });
}

function updateBullets() {
    if (pBullet) { pBullet.y -= 9; if (pBullet.y < 0) pBullet = null; }
    for (let i = eBullets.length - 1; i >= 0; i--) {
        eBullets[i].y += eBullets[i].spd;
        if (eBullets[i].y > H) eBullets.splice(i, 1);
    }
}

function doCollisions() {
    // Player bullet vs invaders
    if (pBullet) {
        for (const inv of invaders) {
            if (!inv.alive) continue;
            if (pBullet.x > inv.x - inv.w / 2 && pBullet.x < inv.x + inv.w / 2 &&
                pBullet.y > inv.y - inv.h / 2 && pBullet.y < inv.y + inv.h / 2) {
                inv.alive = false;
                score += inv.pts;
                if (score > hiScore) hiScore = score;
                addExplosion(inv.x, inv.y, inv.glow);
                pBullet = null;
                updateHUD();
                break;
            }
        }
    }
    // Player bullet vs mystery ship
    if (pBullet && mysteryShip) {
        if (Math.abs(pBullet.x - mysteryShip.x) < 30 && Math.abs(pBullet.y - mysteryShip.y) < 14) {
            score += 100; if (score > hiScore) hiScore = score;
            addExplosion(mysteryShip.x, mysteryShip.y, '#ff00ff');
            mysteryShip = null; pBullet = null; updateHUD();
        }
    }
    // Player bullet vs barriers
    if (pBullet) {
        for (const b of barriers) {
            if (b.hp <= 0) continue;
            if (pBullet.x > b.x && pBullet.x < b.x + b.w && pBullet.y > b.y && pBullet.y < b.y + b.h) {
                b.hp--; pBullet = null; break;
            }
        }
    }
    // Enemy bullets vs barriers & player
    for (let i = eBullets.length - 1; i >= 0; i--) {
        const eb = eBullets[i]; let hit = false;
        for (const b of barriers) {
            if (b.hp <= 0) continue;
            if (eb.x > b.x && eb.x < b.x + b.w && eb.y > b.y && eb.y < b.y + b.h) {
                b.hp--; hit = true; break;
            }
        }
        if (hit) { eBullets.splice(i, 1); continue; }
        const { x, y, w, h } = player;
        if (eb.x > x - w / 2 && eb.x < x + w / 2 && eb.y > y - h && eb.y < y + h / 2) {
            eBullets.splice(i, 1); onPlayerHit();
        }
    }
    // Invaders reach player
    for (const inv of invaders) {
        if (inv.alive && inv.y + inv.h / 2 > player.y - player.h - 5) { doGameOver(); return; }
    }
    // Invaders destroy barriers
    for (const inv of invaders) {
        if (!inv.alive) continue;
        for (const b of barriers) {
            if (b.hp <= 0) continue;
            if (inv.x + inv.w / 2 > b.x && inv.x - inv.w / 2 < b.x + b.w &&
                inv.y + inv.h / 2 > b.y && inv.y - inv.h / 2 < b.y + b.h) b.hp = 0;
        }
    }
}

function onPlayerHit() {
    lives--; updateHUD();
    addExplosion(player.x, player.y, '#00ff00');
    if (lives <= 0) doGameOver();
    else { state = 'dying'; dyingTimer = 0; }
}

function doGameOver() { state = 'gameover'; }

function checkWin() { if (aliveInv().length === 0) { level++; state = 'win'; } }

function updateMystery(dt) {
    msTimer += dt;
    if (!mysteryShip && msTimer > msNextTime) {
        msTimer = 0;
        msNextTime = 12000 + Math.random() * 8000;
        const dir = Math.random() < 0.5 ? 1 : -1;
        mysteryShip = { x: dir === 1 ? -30 : W + 30, y: 28, dir, spd: 2.2 };
    }
    if (mysteryShip) {
        mysteryShip.x += mysteryShip.dir * mysteryShip.spd;
        if (mysteryShip.x < -60 || mysteryShip.x > W + 60) mysteryShip = null;
    }
}

function updateHUD() {
    document.getElementById('sc').textContent = score;
    document.getElementById('hi').textContent = hiScore;
    document.getElementById('lv').textContent = level;
    document.getElementById('li').textContent = '♥'.repeat(Math.max(0, lives)) || '---';
}

// ── GAME FLOW ─────────────────────────────────────────────────────────────────
function startGame() { score = 0; lives = 3; level = 1; startLevel(); }

function startLevel() {
    pBullet = null; eBullets = []; mysteryShip = null;
    msTimer = 0; msNextTime = 15000 + Math.random() * 5000;
    explosions = []; enemyShotTimer = 0; invMoveTimer = 0;
    animFrame = 0; invDir = 1; needsDrop = false;
    initInvaders(); initBarriers();
    player.x = W / 2;
    state = 'playing'; updateHUD();
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  keys.left  = true;
    if (e.key === 'ArrowRight') keys.right = true;
    if (e.key === ' ' || e.key === 'ArrowUp') {
        e.preventDefault();
        if (!keys.space) {
            keys.space = true;
            if (state === 'start')    startGame();
            else if (state === 'gameover') startGame();
            else if (state === 'win') startLevel();
        }
    }
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft')  keys.left  = false;
    if (e.key === 'ArrowRight') keys.right = false;
    if (e.key === ' ' || e.key === 'ArrowUp') keys.space = false;
});

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
let lastT = 0;

function loop(ts) {
    const dt = Math.min(ts - lastT, 50);
    lastT = ts; tick++;

    // Update
    if (state === 'dying') {
        dyingTimer += dt;
        if (dyingTimer > 1500) { player.x = W / 2; state = 'playing'; }
    } else if (state === 'playing') {
        if (keys.left)  player.x = Math.max(player.w / 2 + 5, player.x - player.spd);
        if (keys.right) player.x = Math.min(W - player.w / 2 - 5, player.x + player.spd);
        if (keys.space && !pBullet) {
            const now = performance.now();
            if (now - player.lastShot > player.cooldown) {
                pBullet = { x: player.x, y: player.y - player.h - 10 };
                player.lastShot = now;
            }
        }
        moveInvaders(dt);
        doEnemyShoot(dt);
        updateBullets();
        updateMystery(dt);
        doCollisions();
        checkWin();
    }

    // Draw
    ctx.fillStyle = '#000010';
    ctx.fillRect(0, 0, W, H);
    drawStars();

    if (state === 'start') {
        drawStart();
    } else {
        ctx.strokeStyle = '#004400'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, H - 18); ctx.lineTo(W, H - 18); ctx.stroke();

        drawBarriers();
        invaders.forEach(drawInvader);
        drawMystery();
        drawBullets();
        drawExplosions();

        if (state !== 'dying') {
            drawPlayerShip();
        } else if (Math.floor(dyingTimer / 100) % 2 === 0) {
            ctx.fillStyle = '#ff4400'; ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('💥', player.x, player.y - 5);
            ctx.textAlign = 'left';
        }

        if (state === 'gameover') drawGameOver();
        if (state === 'win')      drawWin();
    }

    requestAnimationFrame(loop);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
initStars();
updateHUD();
requestAnimationFrame(ts => { lastT = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
